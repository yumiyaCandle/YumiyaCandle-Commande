const initCursor = () => {
  const $c = document.getElementById('cur'), $c2 = document.getElementById('cur2');
  if (!$c) return;
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; $c.style.left=mx+'px'; $c.style.top=my+'px'; });
  (function loop(){ rx+=(mx-rx)*.15; ry+=(my-ry)*.15; $c2.style.left=rx+'px'; $c2.style.top=ry+'px'; requestAnimationFrame(loop); })();
  document.addEventListener('mouseover', e => { document.body.classList.toggle('hov', !!e.target.closest('a,button,.coll-card,.prod-card,.sz,[data-pg]')); });
};

// Cart
let cart = [];
function cartTotal() { return cart.reduce((s,i) => s + i.price * i.qty, 0); }
function addToCart(name, size, price) {
  const ex = cart.find(i => i.name === name && i.size === size);
  if (ex) ex.qty++; else cart.push({ name, size, price, qty: 1 });
  renderCart(); bumpCount(); openCart();
}
function removeFromCart(i) { cart.splice(i,1); renderCart(); }
function changeQty(i, d) { cart[i].qty += d; if (cart[i].qty <= 0) cart.splice(i, 1); renderCart(); }
function clearCart() { cart = []; renderCart(); }
function bumpCount() { const el = document.getElementById('cart-count'); el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump'); }
function renderCart() {
  const n = cart.reduce((s,i) => s + i.qty, 0);
  document.getElementById('cart-count').textContent = n;
  document.getElementById('cart-empty').style.display = cart.length ? 'none' : 'flex';
  document.getElementById('cart-ft').style.display = cart.length ? 'block' : 'none';
  document.getElementById('cart-items').innerHTML = cart.map((item, i) => `
    <div class="cart-item">
      <div class="cart-item-img"><img src="${IMG_MAIN}" alt="${item.name}"/></div>
      <div class="cart-item-info">
        <div><div class="cart-item-name">${item.name}</div><div class="cart-item-size">${item.size === 'petite' ? 'Petite · 90g · ~20h' : 'Grande · 180g · ~30h'}</div></div>
        <div class="cart-item-bot">
          <div class="cart-item-price">${(item.price * item.qty).toFixed(2)} CHF</div>
          <div style="display:flex;align-items:center;gap:.4rem">
            <div class="qty-ctrl"><button class="qty-btn" onclick="changeQty(${i},-1)">−</button><span class="qty-num">${item.qty}</span><button class="qty-btn" onclick="changeQty(${i},1)">+</button></div>
            <button class="cart-del" onclick="removeFromCart(${i})">🗑</button>
          </div>
        </div>
      </div>
    </div>`).join('');
  document.getElementById('cart-total').textContent = cartTotal().toFixed(2) + ' CHF';
}
let cartOpen = false;
function openCart()  { cartOpen=true;  document.getElementById('cart-overlay').classList.add('on');  document.getElementById('cart-panel').classList.add('on');  document.body.style.overflow='hidden'; }
